{% extends 'base.html' %}
{% block title %}Créer un club — UniClub Connect{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Créer un club</h1>
    <a href="{{ url_for('clubs') }}" class="btn btn-gray">← Retour</a>
</div>

<div class="card form-card">
    <form method="post">
        <div class="form-group">
            <label>Nom du club</label>
            <input type="text" name="nom" required>
        </div>
        <div class="form-group">
            <label>Thématique</label>
            <input type="text" name="thematique" placeholder="ex: Sport, Culture, Science..." required>
        </div>
        <div class="form-group">
            <label>Fondateur</label>
            <select name="id_fondateur" required>
                <option value="">-- Choisir un membre --</option>
                {% for m in membres %}
                <option value="{{ m.id_membre }}">{{ m.nom_complet }}</option>
                {% endfor %}
            </select>
        </div>
        <p class="form-note">Le club sera créé avec le statut <strong>en attente</strong> et devra être validé par un administrateur.</p>
        <button type="submit" class="btn btn-green">Créer le club</button>
    </form>
</div>
{% endblock %}
