<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniClub Connect{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">🎓 UniClub Connect</a>
    <div class="nav-links">
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Dashboard</a>
        <a href="{{ url_for('membres') }}" class="{{ 'active' if 'membre' in request.endpoint }}">Membres</a>
        <a href="{{ url_for('clubs') }}" class="{{ 'active' if 'club' in request.endpoint }}">Clubs</a>
        <a href="{{ url_for('evenements') }}" class="{{ 'active' if 'evenement' in request.endpoint }}">Événements</a>
        <a href="{{ url_for('stats') }}" class="{{ 'active' if request.endpoint == 'stats' }}">Statistiques</a>
    </div>
</nav>

<main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<footer>
    <p>UniClub Connect — Projet Base de Données 2026</p>
</footer>
</body>
</html>
